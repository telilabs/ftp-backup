# backup.conf — shared settings for ftp-backup.sh and ftp-restore.sh
#
# This file is sourced (not executed) by both scripts. It's plain bash, so
# it can hold the SOURCE_DIRS array directly — no jq/yq needed.
#
# The ": ${VAR:=default}" form means "use the value already set in the
# environment if there is one, otherwise fall back to this default". So you
# can still override anything at runtime, e.g.:
#   FTP_PASS='secret' ./ftp-backup.sh
#
# Contains passwords in plaintext — lock it down:  chmod 600 backup.conf

# --- Folders to back up (used by ftp-backup.sh only) ---
# Plain array; edit freely. Not overridable via env.
SOURCE_DIRS=(
  "$HOME/Documents"
  "$HOME/Pictures"
  # "$HOME/Projects"
)

# --- Retention (ftp-backup.sh) ---
: "${KEEP:=3}"                       # how many backups to keep on the server

# --- FTP server (your phone) ---
: "${FTP_HOST:=192.168.0.14}"        # phone's LAN IP (reserve it in your router)
: "${FTP_PORT:=2221}"                # port your FTP server app listens on
: "${FTP_USER:=user}"                # FTP username
: "${FTP_PASS:=password}"            # FTP password
: "${REMOTE_DIR:=/backups}"          # folder on the phone for archives

# --- Connection type:  ftp | ftpes | ftps | sftp ---
#   ftp    = plain FTP (no encryption)
#   ftpes  = explicit FTPS  (AUTH TLS, same port)   <-- most Android apps
#   ftps   = implicit FTPS  (TLS immediately, often port 990)
#   sftp   = SSH file transfer
: "${PROTO:=ftpes}"
: "${TLS_VERIFY:=false}"             # false = accept self-signed / skip host-key check (LAN)

# --- Archive encryption (must match on backup + restore) ---
: "${ARCHIVE_PASS:=password}"        # AES-256 passphrase

# --- Local staging ---
: "${WORK_DIR:=$HOME/.cache/ftp-backup}"
: "${DELETE_LOCAL_AFTER_UPLOAD:=true}"    # ftp-backup.sh
: "${DELETE_LOCAL_AFTER_EXTRACT:=true}"   # ftp-restore.sh

# --- Restore destination (ftp-restore.sh) ---
# PARENT path the archive is extracted under. A subfolder named after the
# archive (e.g. backup-20260621-143000.tar.gz) is created inside it.
# $SCRIPT_DIR is the scripts' own folder. Leave EMPTY to use $SCRIPT_DIR.
: "${RESTORE_DIR:=./restored}"